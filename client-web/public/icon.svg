<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <style>
    @media (prefers-color-scheme: dark) { .icon-node { fill: #e5e5e5; } .icon-ring { stroke: #e5e5e5; } .icon-line { stroke: #e5e5e5; } .icon-arc { stroke: #e5e5e5; } }
  </style>
  <!-- Motion arc / flow -->
  <path class="icon-arc" d="M14 46 C22 10, 38 10, 44 36 C48 52, 56 44, 54 20" stroke="#1f1f1f" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.2"/>
  <!-- Three connected nodes -->
  <circle class="icon-node" cx="18" cy="40" r="6.5" fill="#1f1f1f"/>
  <circle class="icon-node" cx="38" cy="24" r="6.5" fill="#1f1f1f"/>
  <circle class="icon-ring" cx="54" cy="32" r="5" fill="none" stroke="#1f1f1f" stroke-width="3"/>
  <!-- Connections -->
  <line class="icon-line" x1="23.5" y1="37" x2="32.5" y2="27" stroke="#1f1f1f" stroke-width="2.5" stroke-linecap="round"/>
  <line class="icon-line" x1="43.5" y1="26" x2="49.5" y2="30" stroke="#1f1f1f" stroke-width="2.5" stroke-linecap="round"/>
</svg>
